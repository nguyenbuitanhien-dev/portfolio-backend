server.port=${PORT}
spring.application.name=portfolio-backend

# MongoDB configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/portfolio_db}
spring.data.mongodb.database=${MONGO_DATABASE:portfolio_db}

# Redis configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.repositories.enabled=false

# App-specific custom properties
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION}
app.cors.allowed-origins=*
