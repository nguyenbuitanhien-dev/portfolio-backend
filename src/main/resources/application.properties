server.port=${PORT:8080}
spring.application.name=portfolio-backend

# MongoDB configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/portfolio_db}

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# App-specific custom properties
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.cors.allowed-origins=*
