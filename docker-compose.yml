version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: portfolio-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    container_name: portfolio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app:
    build: .
    container_name: portfolio-app
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=${PORT:-8080}
      - MONGO_URI=${MONGO_URI}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}

volumes:
  mongo-data:
  redis-data:
