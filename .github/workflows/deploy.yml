name: CI/CD - Test and Deploy to Render

on:
  push:
    branches: [ master ]

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Run Maven build/tests
  # ─────────────────────────────────────────────────────────
  build-and-test:
    name: Run Tests and Verify Build
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests and verify compile
        run: ./mvnw clean package

  # ─────────────────────────────────────────────────────────
  # JOB 2: Trigger Render Deploy
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          echo "Render response code: $response"
          
          if [ "$response" -eq 200 ] || [ "$response" -eq 201 ]; then
            echo "Render deploy triggered successfully!"
          else
            echo "Render deploy failed with code: $response"
            exit 1
          fi
