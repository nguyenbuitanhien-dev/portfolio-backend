name: 🚀 CI/CD — Deploy to DigitalOcean

on:
  push:
    branches: [ master ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Build & Test với Maven
  # ─────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Build JAR (skip tests)
        run: ./mvnw clean package -DskipTests

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build Docker Image & Push lên Docker Hub
  # ─────────────────────────────────────────────────────────
  docker:
    name: 🐳 Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # JOB 3: SSH vào DigitalOcean Droplet và Deploy
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🌊 Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 🚀 SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # ── 1. Tạo network nếu chưa có ──────────────────────────
            docker network inspect portfolio-net >/dev/null 2>&1 || \
              docker network create portfolio-net

            # ── 2. Khởi động MongoDB nếu chưa chạy ─────────────────
            docker ps -q -f name=portfolio-mongodb | grep -q . || \
              docker run -d \
                --name portfolio-mongodb \
                --network portfolio-net \
                --restart unless-stopped \
                -v mongo-data:/data/db \
                mongo:7

            # ── 3. Khởi động Redis nếu chưa chạy ───────────────────
            docker ps -q -f name=portfolio-redis | grep -q . || \
              docker run -d \
                --name portfolio-redis \
                --network portfolio-net \
                --restart unless-stopped \
                -v redis-data:/data \
                redis:7-alpine

            # ── 4. Pull image mới nhất từ Docker Hub ───────────────
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ github.sha }}

            # ── 5. Dừng và xóa container cũ ─────────────────────────
            docker stop portfolio-app 2>/dev/null || true
            docker rm   portfolio-app 2>/dev/null || true

            # ── 6. Chạy container mới ───────────────────────────────
            docker run -d \
              --name portfolio-app \
              --network portfolio-net \
              --restart unless-stopped \
              -p ${{ secrets.PORT || '8080' }}:${{ secrets.PORT || '8080' }} \
              -e PORT="${{ secrets.PORT }}" \
              -e MONGO_URI="mongodb://portfolio-mongodb:27017/portfolio_db" \
              -e REDIS_HOST="portfolio-redis" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRATION="${{ secrets.JWT_EXPIRATION }}" \
              -e MAIL_HOST="${{ secrets.MAIL_HOST }}" \
              -e MAIL_PORT="${{ secrets.MAIL_PORT }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ github.sha }}

            # ── 7. Dọn dẹp image cũ ─────────────────────────────────
            docker image prune -f

            echo "✅ Deployed: ${{ github.sha }}"
