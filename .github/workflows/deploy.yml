name: 🚀 CI/CD — Build & Deploy to Render

on:
  push:
    branches: [ master ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Build & Test với Maven
  # ─────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Build JAR (skip tests)
        run: ./mvnw clean package -DskipTests

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build Docker Image & Push lên Docker Hub
  # ─────────────────────────────────────────────────────────
  docker:
    name: 🐳 Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # JOB 3: Trigger Render Deploy via Deploy Hook
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🎯 Deploy to Render
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 🚀 Trigger Render Deploy Hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          echo "Render response code: $response"
          
          if [ "$response" -eq 200 ] || [ "$response" -eq 201 ]; then
            echo "✅ Render deploy triggered successfully!"
          else
            echo "❌ Render deploy failed with code: $response"
            exit 1
          fi
